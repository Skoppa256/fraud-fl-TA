model: fedavg_svm
num_clients: 5
num_rounds: 50
local_epochs: 1
random_seed: 42
oversampling: smote     # one of: smote, adasyn, none
smote_k_neighbors: 5
sampling_strategy: "auto"     # imblearn sampling_strategy; "auto"=1:1, e.g. 0.01 for 1:100
use_wandb: false
wandb_project: "fraud-fl-TA"
early_stop_patience: 10
partition:
  scheme: iid
  alpha: null
# Linear SVM trained by SGD (sklearn SGDClassifier, loss="hinge").
# SGD is used instead of LinearSVC so FedAvg can make incremental progress
# across rounds; see models/fedavg_svm/client.py for the full rationale.
svm_params:
  alpha: 0.0001          # L2 regularization strength (SGD-native; replaces LinearSVC's C)
  max_iter: 5            # SGD epochs per LOCAL round — keep small so each round is a
                         # partial update and FedAvg accumulates across rounds. Large
                         # values re-converge to the local optimum and flatten the curves.
  learning_rate: optimal # SGD step schedule; "optimal" derives the rate from alpha
  eta0: 0.0              # initial LR; only used by constant/invscaling/adaptive schedules
