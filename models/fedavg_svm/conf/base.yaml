model: fedavg_svm
num_clients: 5
num_rounds: 50
local_epochs: 1
random_seed: 42
oversampling: smote     # one of: smote, adasyn, none
smote_k_neighbors: 5
sampling_strategy: "auto"     # imblearn sampling_strategy; "auto"=1:1, e.g. 0.01 for 1:100
use_wandb: false
wandb_project: "fraud-fl-TA"
early_stop_patience: 10
partition:
  scheme: iid
  alpha: null
svm_params:
  C: 1.0
  max_iter: 1000
  warm_start: true
